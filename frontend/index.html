<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>cultivOS — Panel de Granjas</title>
    <meta name="description" content="Panel de agricultura de precision — salud de cultivos, NDVI, suelo y recomendaciones para granjas de Jalisco.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/styles.css">
</head>
<body>

<!-- NAV -->
<nav>
    <div class="nav-inner">
        <a href="/" class="nav-logo">cultiv<span>OS</span></a>
        <ul class="nav-tabs">
            <li><button class="nav-tab active" id="tab-granjas">Granjas</button></li>
            <li><button class="nav-tab" id="tab-fertilizantes" onclick="showFertilizers()">Fertilizantes</button></li>
        </ul>
    </div>
</nav>

<!-- DASHBOARD -->
<main class="dashboard">
    <!-- Header -->
    <div class="dash-header">
        <div>
            <h1 class="dash-title">Granjas</h1>
            <p class="dash-subtitle">Vista general de todas las granjas y su salud</p>
        </div>
    </div>

    <!-- Stats strip -->
    <div class="stats-strip">
        <div class="stat-card">
            <div class="stat-value" id="stat-farms">--</div>
            <div class="stat-label">Granjas</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" id="stat-fields">--</div>
            <div class="stat-label">Campos</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" id="stat-avg-health">--</div>
            <div class="stat-label">Salud Promedio</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" id="stat-hectares">--</div>
            <div class="stat-label">Hectareas Total</div>
        </div>
    </div>

    <!-- Farm cards grid -->
    <div id="farm-grid" class="farm-grid">
        <div class="loading"><div class="loading-spinner"></div>Cargando granjas...</div>
    </div>

    <!-- Field detail panel (hidden by default) -->
    <div id="field-panel" class="field-panel" style="display:none">
        <div class="field-panel-header">
            <h2 id="field-panel-title" class="field-panel-title">Campos</h2>
            <button class="field-panel-back" onclick="closeFarmDetail()">Volver</button>
        </div>
        <div id="field-list" class="field-list"></div>
    </div>

    <!-- Fertilizer knowledge base panel (hidden by default) -->
    <div id="fert-panel" class="field-panel" style="display:none">
        <div class="field-panel-header">
            <h2 class="field-panel-title">Base de Conocimiento — Fertilizantes Organicos</h2>
            <button class="field-panel-back" onclick="closeFertilizers()">Volver</button>
        </div>
        <div id="fert-list" class="field-list"></div>
    </div>
</main>

<script src="/app.js"></script>
</body>
</html>

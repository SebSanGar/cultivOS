<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escalaciones de Alertas | cultivOS</title>
    <style>
        :root {
            --bg: #0f172a;
            --surface: #1e293b;
            --border: #334155;
            --text: #e2e8f0;
            --text-muted: #94a3b8;
            --green: #22c55e;
            --amber: #f59e0b;
            --red: #ef4444;
            --blue: #3b82f6;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: system-ui, sans-serif; background: var(--bg); color: var(--text); padding: 1.5rem; }
        h1 { font-size: 1.5rem; margin-bottom: 1rem; }
        .selector-row { display: flex; gap: 1rem; align-items: center; margin-bottom: 1.5rem; flex-wrap: wrap; }
        .selector-row label { font-size: 0.875rem; color: var(--text-muted); }
        .selector-row select { background: var(--surface); color: var(--text); border: 1px solid var(--border); border-radius: 0.375rem; padding: 0.5rem 0.75rem; font-size: 0.875rem; }
        .kpi-strip { display: flex; gap: 1rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
        .kpi-card { background: var(--surface); border: 1px solid var(--border); border-radius: 0.5rem; padding: 1rem 1.25rem; min-width: 160px; }
        .kpi-card .kpi-label { font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; }
        .kpi-card .kpi-value { font-size: 1.75rem; font-weight: 700; margin-top: 0.25rem; }
        .table-container { background: var(--surface); border: 1px solid var(--border); border-radius: 0.5rem; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 0.875rem; }
        th { text-align: left; padding: 0.75rem 1rem; border-bottom: 1px solid var(--border); color: var(--text-muted); font-weight: 600; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; }
        td { padding: 0.75rem 1rem; border-bottom: 1px solid var(--border); }
        tr:last-child td { border-bottom: none; }
        .severity-pill { display: inline-block; padding: 0.125rem 0.5rem; border-radius: 9999px; font-size: 0.75rem; font-weight: 600; text-transform: capitalize; }
        .severity-critical { background: rgba(239,68,68,0.15); color: var(--red); }
        .severity-high { background: rgba(245,158,11,0.15); color: var(--amber); }
        .severity-medium { background: rgba(59,130,246,0.15); color: var(--blue); }
        .empty-state { text-align: center; padding: 3rem 1rem; color: var(--text-muted); }
    </style>
</head>
<body>
    <h1>Escalaciones de Alertas</h1>

    <div class="selector-row">
        <div>
            <label for="escalation-farm-select">Finca</label><br>
            <select id="escalation-farm-select">
                <option value="">Seleccione una finca</option>
            </select>
        </div>
    </div>

    <div class="kpi-strip" id="escalation-kpi-strip" style="display:none;">
        <div class="kpi-card">
            <div class="kpi-label">Total Escalaciones</div>
            <div class="kpi-value" id="escalation-total">0</div>
        </div>
        <div class="kpi-card">
            <div class="kpi-label">Alertas Criticas</div>
            <div class="kpi-value" id="escalation-critical-count" style="color:var(--red);">0</div>
        </div>
    </div>

    <div class="table-container" id="escalation-table-container" style="display:none;">
        <table id="escalation-table">
            <thead>
                <tr>
                    <th>Campo</th>
                    <th>Tipo de Alerta</th>
                    <th>Severidad</th>
                    <th>Dias Pendientes</th>
                    <th>Accion Recomendada</th>
                </tr>
            </thead>
            <tbody id="escalation-tbody"></tbody>
        </table>
    </div>

    <div class="empty-state" id="escalation-empty">
        Seleccione una finca para ver las escalaciones de alertas.
    </div>

    <script src="escalaciones-alertas.js"></script>
</body>
</html>

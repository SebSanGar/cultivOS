<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reporte Anual | cultivOS</title>
    <link rel="stylesheet" href="/styles.css">
    <style>
        body { font-family: 'Inter', system-ui, sans-serif; margin: 0; padding: 20px; background: #0f172a; color: #e2e8f0; }
        .page-header { text-align: center; margin-bottom: 32px; }
        .page-header h1 { font-size: 1.8rem; margin: 0 0 8px; }
        .page-header p { color: #94a3b8; margin: 0; }
        .selectors { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; margin-bottom: 24px; }
        .selectors select { padding: 8px 16px; border-radius: 8px; border: 1px solid #334155; background: #1e293b; color: #e2e8f0; font-size: 0.95rem; min-width: 180px; }
        .kpi-strip { display: flex; justify-content: center; gap: 24px; flex-wrap: wrap; margin-bottom: 28px; }
        .kpi-card { background: #1e293b; border-radius: 12px; padding: 16px 28px; text-align: center; min-width: 140px; }
        .kpi-card .value { font-size: 1.8rem; font-weight: 700; color: #38bdf8; }
        .kpi-card .label { font-size: 0.85rem; color: #94a3b8; margin-top: 4px; }
        .field-table-wrap { max-width: 900px; margin: 0 auto; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; background: #1e293b; border-radius: 10px; overflow: hidden; }
        th { background: #334155; padding: 10px 12px; text-align: left; font-size: 0.85rem; color: #94a3b8; text-transform: uppercase; }
        td { padding: 10px 12px; border-top: 1px solid #334155; font-size: 0.9rem; }
        .trend-pill { display: inline-block; padding: 2px 10px; border-radius: 6px; font-size: 0.75rem; font-weight: 600; }
        .trend-pill.up { background: #14532d; color: #86efac; }
        .trend-pill.down { background: #7f1d1d; color: #fca5a5; }
        .trend-pill.stable { background: #1e3a5f; color: #7dd3fc; }
        .empty-state { text-align: center; color: #64748b; padding: 40px; }
        a.back-link { color: #38bdf8; text-decoration: none; font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="page-header">
        <a class="back-link" href="/">← Volver al inicio</a>
        <h1>Reporte Anual</h1>
        <p>Resumen anual de rendimiento por finca</p>
    </div>

    <div class="selectors">
        <select id="anual-farm-select"><option value="">Seleccionar Finca...</option></select>
        <select id="anual-year-select"><option value="">Seleccionar Anio...</option></select>
    </div>

    <div class="kpi-strip">
        <div class="kpi-card">
            <div class="value" id="anual-best-field">--</div>
            <div class="label">Mejor campo</div>
        </div>
        <div class="kpi-card">
            <div class="value" id="anual-most-improved">--</div>
            <div class="label">Mas mejorado</div>
        </div>
        <div class="kpi-card">
            <div class="value" id="anual-co2e">--</div>
            <div class="label">CO2e secuestrado (t)</div>
        </div>
        <div class="kpi-card">
            <div class="value" id="anual-treatments">--</div>
            <div class="label">Tratamientos aplicados</div>
        </div>
    </div>

    <div class="field-table-wrap">
        <table id="anual-field-table">
            <thead>
                <tr>
                    <th>Campo</th>
                    <th>Salud Prom.</th>
                    <th>Min</th>
                    <th>Max</th>
                    <th>NDVI Tend.</th>
                    <th>pH Delta</th>
                    <th>Regen</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <script src="/reporte-anual.js"></script>
</body>
</html>

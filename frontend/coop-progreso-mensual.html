<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Progreso Mensual — Cooperativa</title>
    <link rel="stylesheet" href="/styles.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        .prog-container { max-width: 1100px; margin: 0 auto; padding: 2rem 1rem; }
        .prog-header { margin-bottom: 1.5rem; }
        .prog-header h1 { margin: 0 0 0.25rem; }
        .prog-header p { color: var(--text-muted, #888); margin: 0; }
        .prog-selector { margin-bottom: 1.5rem; }
        .prog-selector label { display: block; font-size: 0.9rem; color: var(--text-muted, #888); margin-bottom: 0.35rem; }
        .prog-selector select { width: 100%; max-width: 420px; padding: 0.55rem 0.75rem; background: var(--card-bg, #1a1a2e); color: inherit; border: 1px solid var(--border, #2a2a3e); border-radius: 6px; }
        .prog-trend-row { margin-bottom: 1rem; }
        .prog-pill { display: inline-block; padding: 0.4rem 0.95rem; border-radius: 999px; font-size: 0.85rem; font-weight: 600; }
        .prog-pill.improving { background: #166534; color: #4ade80; }
        .prog-pill.stable { background: #1e293b; color: #94a3b8; }
        .prog-pill.declining { background: #7f1d1d; color: #f87171; }
        .prog-chart-card { background: var(--card-bg, #1a1a2e); border: 1px solid var(--border, #2a2a3e); border-radius: 8px; padding: 1.2rem; margin-bottom: 1.5rem; }
        .prog-chart-card canvas { max-height: 360px; }
        .prog-table-card { background: var(--card-bg, #1a1a2e); border: 1px solid var(--border, #2a2a3e); border-radius: 8px; padding: 1.2rem; }
        .prog-table-card h3 { margin: 0 0 0.75rem; font-size: 1rem; color: var(--text-muted, #888); text-transform: uppercase; letter-spacing: 0.05em; }
        .prog-table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
        .prog-table th, .prog-table td { text-align: left; padding: 0.5rem 0.6rem; border-bottom: 1px solid var(--border, #2a2a3e); }
        .prog-table th { color: var(--text-muted, #888); font-weight: 600; text-transform: uppercase; font-size: 0.75rem; letter-spacing: 0.04em; }
        .prog-delta { display: inline-block; padding: 0.2rem 0.55rem; border-radius: 999px; font-weight: 600; font-size: 0.8rem; }
        .prog-delta.up { background: #166534; color: #4ade80; }
        .prog-delta.down { background: #7f1d1d; color: #f87171; }
        .prog-delta.flat { background: #1e293b; color: #94a3b8; }
        .prog-empty { text-align: center; padding: 3rem; color: var(--text-muted, #888); }
    </style>
</head>
<body>
    <div class="prog-container">
        <header class="prog-header">
            <h1>Progreso Mensual — Cooperativa</h1>
            <p>Evolución longitudinal de la salud promedio y el puntaje regenerativo por mes en toda la cooperativa.</p>
        </header>

        <div class="prog-selector">
            <label for="coop-progress-select">Cooperativa</label>
            <select id="coop-progress-select">
                <option value="">Seleccione una cooperativa...</option>
            </select>
        </div>

        <div id="coop-progress-content" style="display:none;">
            <div class="prog-trend-row">
                <span class="prog-pill stable" id="coop-progress-trend">Tendencia: --</span>
            </div>

            <div class="prog-chart-card">
                <canvas id="coop-progress-chart"></canvas>
            </div>

            <div class="prog-table-card">
                <h3>Variación mes a mes</h3>
                <table class="prog-table">
                    <thead>
                        <tr>
                            <th>Mes</th>
                            <th>Salud</th>
                            <th>Regen</th>
                            <th>Δ MoM</th>
                            <th>Tratamientos</th>
                        </tr>
                    </thead>
                    <tbody id="coop-progress-deltas"></tbody>
                </table>
            </div>
        </div>

        <div id="coop-progress-empty" class="prog-empty">Seleccione una cooperativa para ver el progreso mensual.</div>
    </div>

    <script src="/coop-progreso-mensual.js"></script>
</body>
</html>

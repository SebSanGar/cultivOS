<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>cultivOS — Iniciar Sesion</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/styles.css">
</head>
<body class="login-page">
    <div class="login-container">
        <div class="login-logo">
            <h1>cultiv<span>OS</span></h1>
            <p>Inteligencia agricola de precision</p>
        </div>
        <div class="login-card">
            <h2 id="login-title">Iniciar Sesion</h2>
            <form id="login-form" autocomplete="on">
                <div class="login-field">
                    <label for="login-username">Usuario</label>
                    <input type="text" id="login-username" name="username" required autocomplete="username" placeholder="Tu nombre de usuario">
                </div>
                <div class="login-field">
                    <label for="login-password">Contrasena</label>
                    <input type="password" id="login-password" name="password" required autocomplete="current-password" placeholder="Tu contrasena">
                </div>
                <div class="register-fields" id="register-fields">
                    <div class="login-field">
                        <label for="register-confirm-password">Confirmar Contrasena</label>
                        <input type="password" id="register-confirm-password" name="confirm_password" autocomplete="new-password" placeholder="Repite tu contrasena">
                    </div>
                    <div class="login-field">
                        <label for="register-role">Rol</label>
                        <select id="register-role" name="role">
                            <option value="farmer">Agricultor</option>
                            <option value="researcher">Investigador</option>
                            <option value="admin">Administrador</option>
                        </select>
                    </div>
                    <div class="login-field">
                        <label for="register-farm">Granja</label>
                        <select id="register-farm" name="farm_id">
                            <option value="">Sin granja</option>
                        </select>
                    </div>
                </div>
                <button type="submit" class="login-submit" id="login-submit">Entrar</button>
                <div class="login-error" id="login-error"></div>
            </form>
            <div class="login-toggle">
                <span id="toggle-text">No tienes cuenta?</span>
                <a id="toggle-register">Registrarse</a>
            </div>
        </div>
    </div>
    <script src="/login.js"></script>
</body>
</html>
